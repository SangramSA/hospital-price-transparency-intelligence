#
# CCN and CMS joins use transparency/MRF header fields mapped to
# data/cms_knee_replacement_by_provider.csv per docs/regulatory-and-assessment-reference.md —
# not duplicated here.
#
# Discovery order:
#   1. Use mrf_url as the primary machine-readable file download.
#   2. If that fails (404, expired SAS token, etc.), fetch cms_hpt_index_url, parse the
#      mandated index for current MRF location(s) and/or follow source_page_url, then retry.
#   3. Warren Memorial has no cms-hpt.txt (per reference doc); use mrf_url / site navigation only.

